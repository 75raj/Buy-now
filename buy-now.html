<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyExam247 — Notes &amp; Links</title>
<style>
  :root{
    --ink:#1b1d23;
    --paper:#f6f3ec;
    --paper-2:#ffffff;
    --rule:#dcd6c6;
    --saffron:#d9722c;
    --saffron-dk:#b8591d;
    --green:#2f6b4f;
    --green-dk:#1f4d38;
    --muted:#73706a;
    --chip:#efe9d8;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 6px 16px rgba(27,29,35,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family: "Iowan Old Style","Georgia","Noto Serif",serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom: 96px;
  }
  .topbar{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(180deg, rgba(255, 179, 0, 0.97), rgba(255, 179, 0, 0.88));
    backdrop-filter: blur(6px);
    border-bottom:1px solid var(--rule);
    padding: 14px 18px 12px;
  }
  .brand{
    display:flex; align-items:baseline; gap:10px; max-width:880px; margin:0 auto;
  }
  .brand .mark{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:800; font-size:13px; letter-spacing:0.14em;
    color:var(--paper-2); background:var(--green-dk);
    padding:4px 8px; border-radius:4px;
  }
  .brand h1{
    font-size:19px; margin:0; font-weight:700; letter-spacing:0.01em;
  }
  .brand .tag{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11.5px; color:var(--muted); margin-left:auto; white-space:nowrap;
  }

  .wrap{ max-width:880px; margin:0 auto; padding:22px 16px 0; }

  .classrow{
    display:flex; gap:8px; overflow-x:auto; padding:4px 2px 16px;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .classrow::-webkit-scrollbar{display:none;}
  .classbtn{
    font-family:"Helvetica Neue",Arial,sans-serif;
    flex:0 0 auto;
    border:1.5px solid var(--rule);
    background:var(--paper-2);
    color:var(--ink);
    padding:10px 18px;
    border-radius:999px;
    font-size:14.5px; font-weight:700;
    cursor:pointer;
    transition: all .15s ease;
  }
  .classbtn:hover{ border-color:var(--saffron); }
  .classbtn.active{
    background:var(--green-dk); border-color:var(--green-dk); color:#fff;
  }

  .section-block{ margin-bottom:26px; }
  .section-head{
    display:flex; align-items:center; gap:10px;
    margin: 18px 0 10px;
  }
  .section-head .eyebrow{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11.5px; font-weight:800; letter-spacing:0.12em;
    color:var(--saffron-dk); text-transform:uppercase;
  }
  .section-head::after{
    content:""; flex:1; height:1px; background:var(--rule);
  }

  .subject-grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap:10px;
  }
  .subject-card{
    background:var(--paper-2);
    border:1px solid var(--rule);
    border-radius:10px;
    padding:12px 12px 12px 14px;
    display:flex; align-items:center; gap:10px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .subject-card .chk{
    flex:0 0 auto;
    width:19px; height:19px;
    border-radius:5px;
    border:1.5px solid var(--rule);
    background:var(--paper);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all .12s ease;
  }
  .subject-card .chk svg{ width:12px; height:12px; opacity:0; transition:opacity .12s ease; }
  .subject-card.selected .chk{ background:var(--green); border-color:var(--green); }
  .subject-card.selected .chk svg{ opacity:1; }
  .subject-card.selected{ border-color:var(--green); }

  .subject-card.all-card{
    background: linear-gradient(135deg, #fff8ec, #fdf1de);
    border:1.5px solid var(--saffron);
  }
  .subject-card.all-card .sname{ color:var(--saffron-dk); }
  .subject-card.all-card.selected{ border-color:var(--green); }

  .subject-info{ flex:1; min-width:0; cursor:pointer; }
  .subject-info .sname{
    font-weight:700; font-size:15.5px; line-height:1.25;
  }
  .subject-info .smeta{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px; color:var(--muted); margin-top:2px;
  }

  .copybtn{
    flex:0 0 auto;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12.5px; font-weight:700;
    border:1px solid var(--green-dk);
    color:var(--green-dk);
    background:transparent;
    padding:7px 12px;
    border-radius:7px;
    cursor:pointer;
    transition: all .12s ease;
    white-space:nowrap;
  }
  .copybtn:hover{ background:var(--green-dk); color:#fff; }
  .copybtn.done{ background:var(--green-dk); color:#fff; border-color:var(--green-dk); }

  .empty{
    font-family:"Helvetica Neue",Arial,sans-serif;
    color:var(--muted); font-size:13.5px; padding:30px 4px; text-align:center;
  }

  .selectbar{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    display:flex; justify-content:center;
    padding: 0 16px 18px;
    pointer-events:none;
  }
  .selectbar-inner{
    pointer-events:auto;
    background:var(--green-dk);
    color:#fff;
    border-radius:14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    padding:10px 12px 10px 16px;
    display:flex; align-items:center; gap:12px;
    max-width:680px; width:100%;
    transform: translateY(120%);
    opacity:0;
    transition: transform .25s cubic-bezier(.2,.8,.2,1), opacity .2s ease;
  }
  .selectbar-inner.show{ transform: translateY(0); opacity:1; }
  .selectbar-inner .count{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13.5px; font-weight:700; flex:1;
  }
  .selectbar-inner .count b{ font-size:15px; }
  .sb-btn{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13px; font-weight:700;
    border:none; border-radius:9px;
    padding:9px 14px;
    cursor:pointer;
  }
  .sb-clear{ background:rgba(255,255,255,0.12); color:#fff; }
  .sb-clear:hover{ background:rgba(255,255,255,0.2); }
  .sb-copy{ background:var(--saffron); color:#fff; }
  .sb-copy:hover{ background:var(--saffron-dk); }
  .sb-copy.done{ background:#fff; color:var(--green-dk); }

  .toast{
    position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-12px);
    background:var(--ink); color:#fff;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13px; font-weight:600;
    padding:10px 16px; border-radius:9px;
    opacity:0; pointer-events:none;
    transition: all .22s ease;
    z-index:60;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:480px){
    .brand h1{ font-size:16.5px; }
    .brand .tag{ display:none; }
    .subject-grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark">ME247</span>
    <h1>MyExam247</h1>
    <span class="tag">Bihar Board · Notes, MCQs &amp; PYQs</span>
  </div>
</div>

<div class="wrap">
  <div class="classrow" id="classRow"></div>
  <div id="content"></div>
</div>

<div class="selectbar" id="selectbar">
  <div class="selectbar-inner" id="selectbarInner">
    <div class="count"><b id="selCount">0</b> selected</div>
    <button class="sb-btn sb-clear" id="clearBtn">Clear</button>
    <button class="sb-btn sb-copy" id="copySelBtn">Copy links</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA = {
  "Class 10": {
    "Theory": {
      "__ALL__": "https://drive.google.com/drive/folders/16LYoEBNtaEPcDHAZqd3mKyd0BeKY585M?usp=sharing",
      "Science": "https://drive.google.com/drive/folders/12r72nUC5ZkZQ0z5pZ4kaNtUgRaK0-UtA?usp=sharing",
      "Mathematics": "https://drive.google.com/drive/folders/1kRcLIJMqX8ivToJ45cp0elUhjwv36Exl?usp=sharing",
      "Social Science (SST)": "https://drive.google.com/drive/folders/1TSwvqqGGbwAzxt_K3ujHKNTudIpWwYg9?usp=sharing",
      "Sanskrit": "https://drive.google.com/drive/folders/1bkgYy43-OtJywvlGZbZ2fJ4BWiLJ6A1m?usp=sharing"
    },
    "Objective (MCQ)": {
      "__ALL__": "https://drive.google.com/drive/folders/1M5Yrbycuj4k9ttiACrc-OERa5lanCP_X?usp=sharing",
      "Science": "https://drive.google.com/drive/folders/1wyPNEkUWPJPtjaFPQ9e0Z0d3vy_9MtBG?usp=sharing",
      "Mathematics": "https://drive.google.com/drive/folders/1oEcN-n-mJe34p74SSF2YQ5YkPGvtkFbx?usp=sharing",
      "Hindi": "https://drive.google.com/drive/folders/13TOkYufrvwH_eRHhXmYKsG230d77Cbjp?usp=sharing",
      "English": "https://drive.google.com/drive/folders/1e9LqRnRHJIcM5BbGQQ_He00WSXN1pmdm?usp=sharing",
      "SST": "https://drive.google.com/drive/folders/1_Jbs3Mef4XqPyLZEk86dtNRacc_nqmFx?usp=sharing",
      "Sanskrit": "https://drive.google.com/drive/folders/1a8F650FQa5uddZw6AwQfnXSmROyzgbOu?usp=sharing"
    }
  },
  "Class 11": {
    "Theory": {
      "__ALL__": "https://drive.google.com/drive/folders/1Av2QIXDuzG4YMmKxONulPx8P8k_fjtNL?usp=sharing",
      "Physics": "https://drive.google.com/drive/folders/1GImC00P_MirU4ycJkb6FAMTbOFeToQ6N?usp=sharing",
      "Chemistry": "https://drive.google.com/drive/folders/1xEbz3sNqJrtQsEKKhmtKNKdrw5tgd4zp?usp=sharing",
      "Mathematics": "https://drive.google.com/drive/folders/1UfF6FC7cb1WqAnpBlsbtTVnrcEthnp5-?usp=drive_link",
      "Biology": "https://drive.google.com/drive/folders/1Ev4Wgtt7MSbmmYHcvZCxH733snqVAtDd?usp=sharing",
      "Hindi": "",
      "English": ""
    },
    "Objective (MCQ)": {
      "__ALL__": "https://drive.google.com/drive/folders/1i3cne4XWGPPped6xY4a4JGAX2lSmG0Vi?usp=sharing",
      "Physics": "https://drive.google.com/drive/folders/1nx0ttsBT2v2WiFpRxyVupIyHj0teTRYE?usp=sharing",
      "Chemistry": "https://drive.google.com/drive/folders/1AN6z9qc9qFuM0v6rIQtkfXc-LCMLHqhU?usp=sharing",
      "Mathematics": "",
      "Biology": "https://drive.google.com/drive/folders/1Nqjb91GxFoGuLrzPSFFm7ldciyDKcypy?usp=sharing",
      "Hindi": "",
      "English": ""
    }
  },
  "Class 12": {
    "Theory": {
      "__ALL__": "https://drive.google.com/drive/folders/19i5Hdm2bnMNxwxU0zSbL2x4nMPCJsSjE?usp=sharing",
      "Physics": "https://drive.google.com/drive/folders/1WAc4UwUNjPvo4supz99LMJX5Lxaqs4xW?usp=sharing",
      "Chemistry": "https://drive.google.com/drive/folders/1Dvud61o82LoI85SH8KPqDKbHtYWYU5hl?usp=sharing",
      "Mathematics": "https://drive.google.com/drive/folders/1gc4xTDiYa8Pb-gDQD3MaM6pW_QsBiicw?usp=sharing",
      "Biology": "https://drive.google.com/drive/folders/1lzcxBhkNJe70cJDm-ddYbW7Nw6Hcy9VB?usp=sharing",
      "Hindi": "https://drive.google.com/drive/folders/16EeQ8XaYYe-7B6SLT8mKSLaMSBT3tREk?usp=sharing",
      "English": "https://drive.google.com/drive/folders/11olhSviQoyqGEuEEOOcFnbKpCVZkxPZH?usp=sharing"
    },
    "Objective (MCQ)": {
      "__ALL__": "https://drive.google.com/drive/folders/1P_F7MKihwD0Y7EylMKoRktusMvcYfHJT?usp=sharing",
      "Physics": "https://drive.google.com/drive/folders/1GpqWvbTKjxJcqjKVRXiCpFgzj1PG47Cu?usp=sharing",
      "Chemistry": "https://drive.google.com/drive/folders/1vi8IEvdV3V0I9V5QTMe54h7YxHd9cWBT?usp=sharing",
      "Mathematics": "https://drive.google.com/drive/folders/1LursBU2iv8gJI9am6WCgMICEA-i792E-?usp=sharing",
      "Biology": "https://drive.google.com/drive/folders/1v0n8SgmwUEaIIq_uBR1Z_d7pFCD2YeH-?usp=sharing",
      "Hindi": "https://drive.google.com/drive/folders/1Oo3Ja_ScSy6d_YMTw1DzwiH3sBPltBRc?usp=sharing",
      "English": "https://drive.google.com/drive/folders/1FEHPkD3l11-DIGzxW3Relw9VxhrLEVRp?usp=sharing"
    }
  },
  "Class 12 Arts": {
    "Objective (MCQ)": {
      "__ALL__": "https://drive.google.com/drive/folders/18Tr7YycF7ATiQRs7h1X_mpKLQu46xvfI?usp=drive_link"
    }
  }
};

const CLASS_ORDER = ["Class 10","Class 11","Class 12","Class 12 Arts"];
const SECTION_ORDER = {
  "Class 10": ["Theory","Objective (MCQ)"],
  "Class 11": ["Theory","Objective (MCQ)"],
  "Class 12": ["Theory","Objective (MCQ)"],
  "Class 12 Arts": ["Objective (MCQ)"]
};

let activeClass = CLASS_ORDER.find(c => DATA[c]) || Object.keys(DATA)[0];
const selected = new Map(); // key "Class|Section|Subject" -> {label, url}

function ordinal(cls){
  // "Class 11" -> "Class 11th", "Class 12 Arts" -> "Class 12th Arts"
  if(cls.includes("Arts")){
    const n = cls.replace("Class ", "").replace(" Arts", "").trim();
    return `Class ${n}th Arts`;
  }
  const n = cls.replace("Class ", "").trim();
  return `Class ${n}th`;
}
function keyFor(cls, sec, subj){ return cls + "|" + sec + "|" + subj; }
function labelFor(cls, sec, subj){
  const secShort = sec.toLowerCase().includes("mcq") || sec.toLowerCase().includes("objective") ? "MCQ" : "Theory";
  const clsLabel = ordinal(cls);
  if(subj === "__ALL__"){
    return `${clsLabel} All Subjects ${secShort}`;
  }
  return `${clsLabel} ${subj} ${secShort}`;
}

function renderClassRow(){
  const row = document.getElementById('classRow');
  row.innerHTML = '';
  CLASS_ORDER.filter(c => DATA[c]).forEach(cls => {
    const btn = document.createElement('button');
    btn.className = 'classbtn' + (cls === activeClass ? ' active' : '');
    btn.textContent = cls;
    btn.onclick = () => { activeClass = cls; renderClassRow(); renderContent(); };
    row.appendChild(btn);
  });
}

function checkSvg(){
  return '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 12.5L9 17.5L20 6.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function renderContent(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  const classData = DATA[activeClass];
  if(!classData){ content.innerHTML = '<div class="empty">No material yet for this class.</div>'; return; }

  const sections = (SECTION_ORDER[activeClass] || Object.keys(classData)).filter(s => classData[s]);
  let renderedAny = false;

  sections.forEach(sec => {
    const subjects = classData[sec];
    // only subjects that actually have a non-empty url
    const subjectKeys = Object.keys(subjects)
      .filter(subj => subjects[subj] && subjects[subj].trim() !== '')
      .sort((a,b) => {
        if(a === "__ALL__") return -1;
        if(b === "__ALL__") return 1;
        return a.localeCompare(b);
      });

    if(subjectKeys.length === 0) return; // skip empty sections entirely

    renderedAny = true;

    const block = document.createElement('div');
    block.className = 'section-block';

    const head = document.createElement('div');
    head.className = 'section-head';
    const eyebrow = document.createElement('span');
    eyebrow.className = 'eyebrow';
    eyebrow.textContent = sec;
    head.appendChild(eyebrow);
    block.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'subject-grid';

    subjectKeys.forEach(subj => {
      const url = subjects[subj];
      const k = keyFor(activeClass, sec, subj);
      const isSelected = selected.has(k);
      const isAll = subj === "__ALL__";
      const displayName = isAll ? "📦 All Subjects" : subj;

      const card = document.createElement('div');
      card.className = 'subject-card' + (isSelected ? ' selected' : '') + (isAll ? ' all-card' : '');

      const chk = document.createElement('div');
      chk.className = 'chk';
      chk.innerHTML = checkSvg();
      chk.onclick = (e) => { e.stopPropagation(); toggleSelect(activeClass, sec, subj, url); };

      const info = document.createElement('div');
      info.className = 'subject-info';
      info.innerHTML = `<div class="sname">${displayName}</div><div class="smeta">${ordinal(activeClass)} · ${sec}</div>`;
      info.onclick = () => toggleSelect(activeClass, sec, subj, url);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copybtn';
      copyBtn.textContent = 'Open';
      copyBtn.onclick = (e) => {
        e.stopPropagation();
        window.open(url, '_blank');
      };

      card.appendChild(chk);
      card.appendChild(info);
      card.appendChild(copyBtn);
      grid.appendChild(card);
    });

    block.appendChild(grid);
    content.appendChild(block);
  });

  if(!renderedAny){
    content.innerHTML = '<div class="empty">No material uploaded yet for this class. Check back soon.</div>';
  }
}

function toggleSelect(cls, sec, subj, url){
  const k = keyFor(cls, sec, subj);
  if(selected.has(k)){
    selected.delete(k);
  } else {
    selected.set(k, { label: labelFor(cls, sec, subj), url });
  }
  renderContent();
  renderSelectBar();
}

function renderSelectBar(){
  const bar = document.getElementById('selectbarInner');
  const count = document.getElementById('selCount');
  count.textContent = selected.size;
  if(selected.size > 0){
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

function buildSingleText(cls, sec, subj, url){
  return `${labelFor(cls, sec, subj)}\n${url}`;
}

function buildSelectedText(){
  let lines = [];
  selected.forEach(item => {
    lines.push(item.label);
    lines.push(item.url);
    lines.push('');
  });
  return lines.join('\n').trim();
}

function copyText(text, onDone){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(onDone).catch(() => fallbackCopy(text, onDone));
  } else {
    fallbackCopy(text, onDone);
  }
}

function fallbackCopy(text, onDone){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  onDone();
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

document.getElementById('clearBtn').onclick = () => {
  selected.clear();
  renderContent();
  renderSelectBar();
};

document.getElementById('copySelBtn').onclick = (e) => {
  if(selected.size === 0) return;
  const text = buildSelectedText();
  copyText(text, () => {
    const btn = e.currentTarget;
    btn.textContent = 'Copied ✓';
    btn.classList.add('done');
    showToast(`Copied ${selected.size} link${selected.size>1?'s':''}`);
    setTimeout(() => { btn.textContent = 'Copy links'; btn.classList.remove('done'); }, 1400);
  });
};

renderClassRow();
renderContent();
renderSelectBar();
</script>

</body>
</html>
